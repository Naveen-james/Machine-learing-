<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Analytics Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(31, 38, 135, 0.5);
        }

        .card h3 {
            margin-bottom: 20px;
            font-size: 18px;
            color: #64b5f6;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            color: #81c784;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
        }

        .three-d-container {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            overflow: hidden;
        }

        .row-full {
            grid-column: 1 / -1;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #64b5f6, #81c784);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Machine Learning Analytics Dashboard</h1>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            <!-- KPI Cards -->
            <div class="card">
                <h3>Model Accuracy</h3>
                <div class="stat-value">94.7%</div>
                <div class="stat-label">↑ 2.3% from last week</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 94.7%;"></div>
                </div>
            </div>

            <div class="card">
                <h3>Training Samples</h3>
                <div class="stat-value">15,240</div>
                <div class="stat-label">Active datasets</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 85%;"></div>
                </div>
            </div>

            <div class="card">
                <h3>Processing Time</h3>
                <div class="stat-value">2.4s</div>
                <div class="stat-label">Average inference time</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 60%;"></div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="card row-full">
                <h3>Model Performance Over Time</h3>
                <div class="canvas-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>

            <!-- 3D Visualization -->
            <div class="card row-full">
                <h3>3D Data Visualization</h3>
                <div class="three-d-container" id="threeContainer"></div>
            </div>

            <!-- Distribution Chart -->
            <div class="card">
                <h3>Data Distribution</h3>
                <div class="canvas-container">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>

            <!-- Prediction Metrics -->
            <div class="card">
                <h3>Prediction Metrics</h3>
                <div class="canvas-container">
                    <canvas id="metricsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Performance Chart
        const perfCtx = document.getElementById('performanceChart').getContext('2d');
        new Chart(perfCtx, {
            type: 'line',
            data: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6'],
                datasets: [{
                    label: 'Accuracy (%)',
                    data: [85, 87, 89, 91, 93, 94.7],
                    borderColor: '#64b5f6',
                    backgroundColor: 'rgba(100, 181, 246, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#fff' } } },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#fff' }
                    },
                    x: { 
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#fff' }
                    }
                }
            }
        });

        // Distribution Chart
        const distCtx = document.getElementById('distributionChart').getContext('2d');
        new Chart(distCtx, {
            type: 'doughnut',
            data: {
                labels: ['Training', 'Validation', 'Testing'],
                datasets: [{
                    data: [70, 15, 15],
                    backgroundColor: ['#64b5f6', '#81c784', '#ffb74d']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });

        // Metrics Chart
        const metCtx = document.getElementById('metricsChart').getContext('2d');
        new Chart(metCtx, {
            type: 'bar',
            data: {
                labels: ['Precision', 'Recall', 'F1-Score'],
                datasets: [{
                    label: 'Metrics',
                    data: [0.94, 0.95, 0.945],
                    backgroundColor: ['#64b5f6', '#81c784', '#ffb74d']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: { legend: { labels: { color: '#fff' } } },
                scales: {
                    x: { 
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#fff' }
                    },
                    y: { ticks: { color: '#fff' } }
                }
            }
        });

        // 3D Visualization with Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / 2, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        const container = document.getElementById('threeContainer');
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0.1);
        container.appendChild(renderer.domElement);

        // Create 3D points
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        for (let i = 0; i < 100; i++) {
            positions.push(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        
        const material = new THREE.PointsMaterial({ color: 0x64b5f6, size: 0.5 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.x += 0.001;
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
